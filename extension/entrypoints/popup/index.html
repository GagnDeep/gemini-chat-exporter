<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gemini Chat Archive</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header>
      <div class="logo">✦</div>
      <div>
        <h1>Gemini Chat Archive</h1>
        <p class="sub">Capture · Search · Export</p>
      </div>
    </header>

    <main>
      <button id="open-archive-chat" class="primary">Open this chat in Archive</button>

      <div class="row2">
        <button id="scrape-full" class="secondary">Capture full chat</button>
        <button id="scrape" class="secondary">Capture visible</button>
      </div>

      <div id="job" class="job" hidden></div>
      <p id="status" class="status"></p>

      <section id="collection">
        <div class="collection-head">
          <h2>Collected chats (<span id="count">0</span>)</h2>
          <button id="clear" class="link" hidden>Clear all</button>
        </div>
        <ul id="list" class="list"></ul>
        <p id="empty" class="empty">No chats yet. Open a Gemini conversation and click “Open this chat in Archive” (or press Alt+Shift+G to capture in the background).</p>
      </section>

      <div class="actions actions-grid" id="bulk-actions" hidden>
        <button id="export-epub" class="secondary">Export all EPUB</button>
        <button id="export-md" class="secondary">Export Markdown</button>
        <button id="export-json" class="secondary">Export JSON</button>
        <button id="sync-all" class="secondary">Sync all to web app</button>
      </div>

      <div class="footer">
        <button id="open-archive" class="link">Open Archive</button>
        <span class="dot">·</span>
        <button id="open-options" class="link">Settings</button>
        <span class="dot">·</span>
        <button id="open-webapp" class="link">Web app</button>
      </div>
    </main>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
